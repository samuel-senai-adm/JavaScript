<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div>
        <form>
            <h2>Cadastro de usuário</h2><br>
            <h4>Nome</h4> 
            <input type="text" id="nome" placeholder="Digite seu nome">
            <span id="msgNome"></span>

            <h6>E-mail</h6>
            <input type="email" id="email" placeholder="Digite um email">
            <span id="msgEmail"></span>

            <h4>Senha</h4>
            <input type="password" id="senha" placeholder="Digite uma senha">
            <span id="msgSenha"></span>

            <h5>Telefone</h5>
            <input type="text" id="telefone" placeholder="Digite um telefone" required maxlength="20">
            
            <span id="msgTel"></span>
            

           
            <button type="button" id="botao">+</button>
            <br>
            <ul id = "list"></ul>
            <br>
