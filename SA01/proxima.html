<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div>
        <form>
            
            <h2>Endereço</h2>

            <label for="uf">Estado:</label>
            <select name="uf" id="uf">
                <option value="" selected disabled>– Selecione seu estado –</option>
            </select>

            <label for="city">Cidade:</label>
            <select name="city" id="city">
                <option value="" disabled selected>– Selecione sua cidade –</option>
            </select>


            <label>Bairro:</label>
            <input type="text" id="bairro" placeholder="Digite sua rua">
            <span id="msgBairro"></span>
            

            <label>Rua:</label>
            <input type="text" id="rua" placeholder="Digite sua rua">
            <span id="msgRua"></span>

            <label>Número:</label>
            <input type="text" id="numero" placeholder="Digite o número da casa">
            <span id="msgNumero"></span><br>

            <a href="index.html">Página anterior</a>

            <button type="button" id="cadastro">Cadastrar</button>
        
            

        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="ibge.js"></script>
    <script src="script.js"></script>
</body>

</html>
